# GitHub Actions workflow to verify the project setup
name: Verify Setup

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  verify-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Check Python syntax
        run: |
          cd backend
          python -m py_compile main.py
          python -m py_compile crew/founder_crew.py
          python -m py_compile utils/sarvam_llm.py
          python -m py_compile utils/tavily_search.py

  verify-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          cd frontend
          npm install
      
      - name: Type check
        run: |
          cd frontend
          npm run type-check
      
      - name: Build
        run: |
          cd frontend
          npm run build

  verify-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Check for secrets
        run: |
          if git grep -q "TAVILY_API_KEY=tvly-" || git grep -q "SARVAM_API_KEY=sk-"; then
            echo "ERROR: API keys found in code"
            exit 1
          fi
          echo "No secrets found in code"
